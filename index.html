<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanceFlow">
<meta name="theme-color" content="#0d1117">
<title>💎 FinanceFlow</title>
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2128;
  --border:#21262d; --border2:#30363d;
  --text:#e6edf3; --text2:#8b949e; --text3:#656d76;
  --gold:#e8a87c; --green:#7ce8c0; --blue:#7cb8e8;
  --red:#e87c7c; --purple:#c07ce8; --orange:#f7931a;
  --radius:14px; --radius-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',-apple-system,BlinkMacSystemFont,sans-serif;direction:rtl;-webkit-text-size-adjust:100%;height:100%}
input,textarea,select,button{font-family:inherit;-webkit-appearance:none;appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(232,168,124,0.15)}
::-webkit-scrollbar{width:0;height:0}
button{cursor:pointer;transition:opacity 0.15s,transform 0.1s}
button:active{opacity:0.7;transform:scale(0.96)}
#app{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
#header{background:rgba(22,27,34,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;display:flex;justify-content:space-between;align-items:center}
#logo-text{font-size:17px;font-weight:800;color:var(--gold)}
#logo-sub{font-size:11px;color:var(--text2);margin-top:1px}
.header-help{background:none;border:1px solid var(--border2);border-radius:20px;color:var(--text2);padding:6px 12px;font-size:13px}
#content{flex:1;max-width:820px;margin:0 auto;width:100%;padding:16px 14px calc(env(safe-area-inset-bottom,20px) + 80px);overflow-x:hidden}
#nav{background:rgba(22,27,34,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:52px;border-top:2px solid transparent;transition:color 0.15s,border-color 0.15s}
.nav-btn.active{color:var(--gold);border-top-color:var(--gold)}
.nav-btn span:first-child{font-size:20px}
.nav-btn span:last-child{font-size:10px;font-weight:500}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px}
.page-title{font-size:20px;font-weight:800;margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(33,38,45,0.5)}
.row:last-child{border-bottom:none}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:10px}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.kpi-val{font-size:16px;font-weight:800}
.prog-bg{background:var(--bg3);border-radius:6px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width 0.6s ease}
.inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:12px 14px;font-size:16px;font-family:inherit;transition:border-color 0.15s}
.inp::placeholder{color:var(--text3)}
.inp-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.inp-group{margin-bottom:13px}
textarea.inp{resize:vertical;min-height:70px}
.btn-primary{background:var(--gold);color:#0d1117;border:none;border-radius:var(--radius-sm);padding:12px 20px;font-weight:800;font-size:14px;font-family:inherit;min-height:44px}
.btn-secondary{background:none;color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;font-family:inherit;min-height:40px}
.btn-danger{background:none;color:var(--red);border:1px solid rgba(232,124,124,0.3);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px}
.btn-icon{background:none;border:none;padding:5px 7px;font-size:16px;min-height:32px;min-width:32px}
.btn-mini{background:var(--bg3);color:var(--gold);border:1px solid var(--border);border-radius:9px;padding:5px 10px;font-size:12px;min-height:30px}
.btn-pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text2);white-space:nowrap}
.btn-pill.active{border-color:var(--gold);color:var(--gold);background:rgba(232,168,124,0.12)}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
#modal-overlay.show{display:flex}
#modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.3,0.64,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.back-btn{background:none;border:none;color:var(--text2);font-size:13px;padding:3px}
.info-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;font-size:12px;color:var(--text2);line-height:1.6}
.tip-box{background:rgba(124,232,192,0.08);border:1px solid rgba(124,232,192,0.2);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--green)}
.warn-box{background:rgba(232,124,124,0.08);border:1px solid rgba(232,168,124,0.2);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--gold)}
.inv-card{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.goal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.goal-stats{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0}
.goal-stat label{font-size:10px;color:var(--text3);display:block}
.goal-stat span{font-weight:800;font-size:13px}
.goal-badge{display:inline-block;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;margin-top:6px}
.goal-badge.good{background:rgba(124,232,192,0.15);color:var(--green)}
.goal-badge.warn{background:rgba(232,168,124,0.15);color:var(--gold)}
.goal-badge.danger{background:rgba(232,124,124,0.15);color:var(--red)}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(33,38,45,0.4);gap:8px}
.tx-row:last-child{border-bottom:none}
.type-card{flex:1;background:transparent;border:2px solid var(--border2);border-radius:var(--radius);padding:18px 10px;text-align:center;color:var(--text);min-height:90px}
.cat-option{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-title{font-weight:700;font-size:16px;margin-bottom:7px}
.empty-sub{color:var(--text2);font-size:13px;margin-bottom:20px}
.welcome-opt{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;color:var(--text);text-align:right;margin-bottom:8px}
.dist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border-radius:8px;margin-bottom:5px}
.chat-bubble{max-width:84%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.chat-bubble.user{background:#1e2a3a;border:1px solid rgba(124,184,232,0.2)}
.chat-bubble.ai{background:#121e12;border:1px solid rgba(124,232,192,0.2)}
.chat-sender{font-size:10px;font-weight:700;margin-bottom:4px}
.chat-sender.user{color:var(--blue)}
.chat-sender.ai{color:var(--green)}
#chat-messages{min-height:200px;max-height:40vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:12px}
.chat-row{display:flex}
.chat-row.user{justify-content:flex-start}
.chat-row.ai{justify-content:flex-end}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.loading-dot{animation:pulse 1.2s infinite}
.btn-confirm-del{background:var(--red);color:white;border:none;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700}
.salary-summary{background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-top:10px}
.profile-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fix-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:9px;margin-right:5px}
.alloc-mode-row{display:flex;gap:8px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;gap:9px">
      <span style="font-size:22px">💎</span>
      <div>
        <div id="logo-text">FinanceFlow</div>
        <div id="logo-sub" style="display:none"></div>
      </div>
    </div>
    <button class="header-help" onclick="showHelp()">❓ עזרה</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goTab('dashboard')" id="tab-dashboard"><span>🏠</span><span>סקירה</span></button>
    <button class="nav-btn" onclick="goTab('investments')" id="tab-investments"><span>📊</span><span>השקעות</span></button>
    <button class="nav-btn" onclick="goTab('transactions')" id="tab-transactions"><span>💳</span><span>תזרים</span></button>
    <button class="nav-btn" onclick="goTab('goals')" id="tab-goals"><span>🎯</span><span>יעדים</span></button>
    <button class="nav-btn" onclick="goTab('salary')" id="tab-salary"><span>💰</span><span>משכורת</span></button>
    <button class="nav-btn" onclick="goTab('ai')" id="tab-ai"><span>🤖</span><span>AI</span></button>
    <button class="nav-btn" onclick="goTab('settings')" id="tab-settings"><span>⚙️</span><span>הגדרות</span></button>
  </nav>
</div>
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box"></div>
</div>
<script>
const KEY='ff_v5';
const BLANK={investments:[],goals:[],transactions:[],aiChat:[],settings:{name:'',age:'',familyStatus:'',occupation:'',city:'',salaryDay:10,monthlySalary:'',fixedExpenses:[],savingsAllocation:[],recurringPayments:[],notes:''},lastCompound:null};
function loadData(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):JSON.parse(JSON.stringify(BLANK))}catch{return JSON.parse(JSON.stringify(BLANK))}}
function saveData(){try{localStorage.setItem(KEY,JSON.stringify(DB))}catch{}}
let DB=loadData();
const fmt=n=>(+(n||0)).toLocaleString('he-IL');
const fmtSign=n=>(n>=0?'+':'')+fmt(n);
const nowMonth=()=>new Date().toISOString().slice(0,7);
const todayStr=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now()+Math.floor(Math.random()*9999);
const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const monthLabel=ym=>{if(!ym)return'';const[y,m]=ym.split('-');return MONTHS[parseInt(m)-1]+' '+y};
const INV=[{id:'realestate',label:'נדל״ן',icon:'🏠',color:'#e8a87c'},{id:'stocks',label:'שוק ההון',icon:'📈',color:'#7ce8c0'},{id:'pension',label:'פנסיה / השתלמות',icon:'🏦',color:'#7cb8e8'},{id:'crypto',label:'קריפטו',icon:'₿',color:'#f7931a'},{id:'business',label:'עסק / פרילנס',icon:'💼',color:'#c07ce8'},{id:'other',label:'אחר',icon:'💰',color:'#aaa'}];
const iCat=id=>INV.find(c=>c.id===id)||INV[5];
const FXCAT=[{id:'mortgage',label:'🏠 משכנתא',color:'#e8a87c'},{id:'savings',label:'📈 חיסכון',color:'#7ce8c0'},{id:'insurance',label:'🛡️ ביטוח',color:'#7cb8e8'},{id:'pension',label:'🏦 פנסיה',color:'#c07ce8'},{id:'rent',label:'🏘️ שכ״ד',color:'#f7931a'},{id:'mgmtfee',label:'💳 דמי ניהול',color:'#e87c7c'},{id:'expense',label:'📋 אחר',color:'#aaa'}];
const fxCat=id=>FXCAT.find(c=>c.id===id)||FXCAT[6];
const INC=['משכורת','בונוס','שכ״ד שמתקבל','דיבידנד','פרילנס','מכירת נכס','מתנה','קצבה'];
const EXP=['שכר דירה / משכנתא','מזון וסופר','תחבורה','בידור ומסעדות','בריאות','ביגוד','חינוך','חשבונות','ביטוח','ילדים','חופשות','מנויים','ספורט'];
const FS=['רווק/ה','נשוי/נשואה','גרוש/ה','אלמן/ה','ידוע/ה בציבור'];
const DCAT=[{id:'mortgage',l:'🏠 משכנתא'},{id:'savings',l:'📈 חיסכון'},{id:'pension',l:'🏦 פנסיה'},{id:'food',l:'🍎 מזון'},{id:'transport',l:'🚗 תחבורה'},{id:'expense',l:'📋 אחר'}];
const DC={mortgage:'#e8a87c',savings:'#7ce8c0',pension:'#7cb8e8',food:'#f7931a',transport:'#c07ce8',expense:'#aaa'};
(function(){const tm=nowMonth();if(DB.lastCompound===tm)return;DB.investments=DB.investments.map(inv=>{const dep=parseFloat(inv.monthlyDeposit)||0,ret=(parseFloat(inv.annualReturn)||0)/12/100,fee=(parseFloat(inv.managementFeePercent)||0)/12/100;if(!dep&&!ret&&!fee)return inv;return{...inv,currentValue:Math.round((inv.currentValue||0)*(1+ret-fee)+dep)}});DB.lastCompound=tm;saveData()})();
let curTab='dashboard';
function goTab(t){curTab=t;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const b=document.getElementById('tab-'+t);if(b)b.classList.add('active');render()}
function getFin(){const tot=DB.investments.reduce((s,i)=>s+(i.currentValue||0),0);const totFee=DB.investments.reduce((s,i)=>s+(parseFloat(i.managementFee)||0)+(parseFloat(i.managementFeeFixed)||0)+((parseFloat(i.managementFeePercent)||0)/12/100*(i.currentValue||0)),0);const uTx=DB.transactions.filter(t=>!t.auto);const tm=nowMonth(),tmTx=uTx.filter(t=>t.date&&t.date.startsWith(tm));const inc=tmTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);const exp=tmTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);return{tot,totFee,uTx,inc,exp,bal:inc-exp}}
function render(){const s=DB.settings||{};const sub=document.getElementById('logo-sub');if(s.name){sub.textContent='שלום, '+s.name+' 👋';sub.style.display='block'}else sub.style.display='none';const c=document.getElementById('content');c.innerHTML='';const isNew=!s.name&&!DB.investments.length&&!DB.transactions.length;if(isNew&&curTab==='dashboard'){c.appendChild(rWelcome());return}switch(curTab){case'dashboard':c.appendChild(rDash());break;case'investments':c.appendChild(rInv());break;case'transactions':c.appendChild(rTx());break;case'goals':c.appendChild(rGoals());break;case'salary':c.appendChild(rSalary());break;case'ai':c.appendChild(rAI());break;case'settings':c.appendChild(rSettings());break;}}
function rWelcome(){const d=document.createElement('div');d.style.cssText='text-align:center;padding-top:36px';d.innerHTML=`<div style="font-size:56px;margin-bottom:10px">💎</div><h2 style="margin:0 0 7px;font-size:22px;color:var(--text)">ברוכים הבאים!</h2><p style="color:var(--text2);margin-bottom:24px">ניהול כסף חכם ופשוט</p><div style="max-width:280px;margin:0 auto"><label class="inp-label">איך קוראים לך?</label><input id="wname" class="inp" style="font-size:17px;text-align:center;margin-bottom:14px" placeholder="שם פרטי"><button class="btn-primary" style="width:100%;font-size:15px" onclick="wNext()">בואו נתחיל! 🚀</button></div>`;return d}
function wNext(){const n=(document.getElementById('wname')||{}).value||'';if(!n.trim())return;DB.settings.name=n.trim();saveData();goTab('settings')}
function rDash(){const{tot,totFee,uTx,inc,exp,bal}=getFin();const s=DB.settings||{};const d=document.createElement('div');if(s.name)d.innerHTML+=`<div class="card" style="display:flex;align-items:center;gap:10px;border-color:rgba(232,168,124,0.2)"><div style="font-size:28px">👤</div><div><div style="font-weight:800;font-size:14px;color:var(--text)">${s.name}${s.age?' • גיל '+s.age:''}</div><div style="color:var(--text2);font-size:12px">${[s.familyStatus,s.occupation,s.city].filter(Boolean).join(' • ')||'מלא פרופיל בהגדרות'}</div></div></div>`;d.innerHTML+=`<h2 class="page-title" style="color:var(--text)">📊 סקירה כללית</h2><div class="kpi-grid"><div class="kpi-card" style="border-color:rgba(232,168,124,0.25)"><span style="font-size:22px">💎</span><div><div class="kpi-label">סך נכסים</div><div class="kpi-val" style="color:var(--gold)">₪${fmt(tot)}</div></div></div><div class="kpi-card" style="border-color:rgba(124,232,192,0.25)"><span style="font-size:22px">📥</span><div><div class="kpi-label">הכנסות החודש</div><div class="kpi-val" style="color:var(--green)">₪${fmt(inc)}</div></div></div><div class="kpi-card" style="border-color:rgba(232,124,124,0.25)"><span style="font-size:22px">📤</span><div><div class="kpi-label">הוצאות החודש</div><div class="kpi-val" style="color:var(--red)">₪${fmt(exp)}</div></div></div><div class="kpi-card" style="border-color:rgba(${bal>=0?'124,232,192':'232,124,124'},0.25)"><span style="font-size:22px">💵</span><div><div class="kpi-label">יתרה</div><div class="kpi-val" style="color:${bal>=0?'var(--green)':'var(--red)'}">₪${fmt(bal)}</div></div></div></div>`;if(totFee>0)d.innerHTML+=`<div class="card" style="border-color:rgba(232,124,124,0.3);background:rgba(232,124,124,0.05)"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;color:var(--red)">💳 דמי ניהול חודשיים</div><div style="color:var(--text2);font-size:11px">₪${fmt(Math.round(totFee*12))} בשנה</div></div><div style="font-size:17px;font ></div>`;else{const bM={};fil.forEach(t=>{const m=t.date?t.date.slice(0,7):'x';if(!bM[m])bM[m]=[];bM[m].push(t)});Object.keys(bM).sort().reverse().forEach(m=>{const txs=bM[m];const mI=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);const mE=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);const mB=mI-mE;h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-weight:800;font-size:14px;color:var(--text)">${monthLabel(m)}</span><div style="display:flex;gap:7px;align-items:center"><span style="font-size:11px;color:var(--text2)">₪${fmt(mI)} / ₪${fmt(mE)}</span><span style="font-weight:800;color:${mB>=0?'var(--green)':'var(--red)'}">${mB>=0?'✅':'⚠️'} ${fmtSign(mB)}</span></div></div>`;txs.forEach((t,i)=>{h+=`<div class="tx-row" style="${i===txs.length-1?'border-bottom:none':''}"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;color:var(--text)">${t.type==='income'?'📥':'📤'} ${t.category}</div>${t.note?`<div style="font-size:11px;color:var(--text2)">${t.note}</div>`:''}<div style="font-size:10px;color:var(--text3)">${t.date||''}</div></div><div style="display:flex;align-items:center;gap:5px"><span style="font-weight:800;font-size:13px;color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}₪${fmt(t.amount)}</span><button class="btn-icon" style="color:var(--blue);font-size:13px" onclick='openEditTx(${t.id})'>✏️</button><button class="btn-icon" style="color:var(--red);font-size:13px" onclick='delTx(${t.id})'>✕</button></div></div>`});h+='</div>'})}d.innerHTML=h;return d}

</div>`;h+=`<div class="inp-group"><label class="inp-label">תאריך</label><input class="inp" type="date" value="${txW.date}" oninput="txW.date=this.value"></div>`;h+=`<div class="inp-group"><label class="inp-label">הערה <span style="color:var(--text3);font-size:10px">(אופציונלי)</span></label><input class="inp" value="${txW.note}" placeholder="על מה?" oninput="txW.note=this.value"></div>`;h+=`<div style="display:flex;gap:7px"><button class="btn-primary" style="flex:1" onclick="saveTx()">${isE?'💾 שמור':'✅ הוסף'}</button><button class="btn-secondary" onclick="closeModal()">ביטול</button></div>`;openModal(h)}}

function rGoals(){const d=document.createElement('div');const now=new Date();let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 class="page-title" style="margin:0;color:var(--text)">🎯 יעדים פיננסיים</h2><button class="btn-primary" onclick="openGoalW()">➕ יעד חדש</button></div>`;if(!DB.goals.length)h+=`<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title" style="color:var(--text)">אין יעדים עדיין</div><div class="empty-sub">הגדר יעד — חופשה, רכב, דירה...</div><button class="btn-primary" onclick="openGoalW()">➕ הגדר יעד</button></div>`;else DB.goals.forEach(g=>{const pct=g.target?Math.min(100,(g.saved||0)/g.target*100):0;const rem=g.target-(g.saved||0);const done=pct>=100;let mLeft=null,achievable=null,bC='warn',bT='';if(g.deadline){const dd=new Date(g.deadline+'-01');mLeft=Math.round((dd-now)/(1000*60*60*24*30));const needed=g.monthly||(mLeft>0?Math.ceil(rem/mLeft):Infinity);const sal=parseFloat(DB.settings.monthlySalary)||0;const fixT=(DB.settings.fixedExpenses||[]).reduce((s,e)=>s+e.amount,0);const avail=sal>0?sal-fixT:null;if(mLeft<=0){bC='danger';bT='⚠️ תאריך עבר'}else if(done){bC='good';bT='✅ הושג!'}else if(avail!==null){achievable=needed<=avail;if(achievable){bC='good';bT=`✅ בר-השגה — ₪${fmt(needed)}/חודש`}else{bC='danger';bT=`⚠️ צריך ₪${fmt(needed)}/חודש — גבוה מהיכולת`}}else bT=`💡 צריך ₪${fmt(needed)}/חודש`}else if(done){bC='good';bT='✅ הושג!'}else if(g.monthly)bT=`💡 ₪${fmt(g.monthly)}/חודש`;const r=22;const circ=2*Math.PI*r;const sd=circ-(pct/100)*circ;const rc=done?'#7ce8c0':pct>70?'#e8a87c':pct>40?'#f7931a':'#e87c7c';h+=`<div class="goal-card" style="border-color:${done?'rgba(124,232,192,0.3)':'var(--border)'}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-weight:800;font-size:16px;margin-bottom:4px;color:var(--text)">${done?'✅ ':''}${g.name}</div>${g.deadline?`<div style="color:var(--text2);font-size:12px">🗓 ${monthLabel(g.deadline)}${mLeft!==null&&!done?` · ${mLeft} חודשים נותרו`:''}${mLeft!==null&&mLeft<=0?' · תאריך עבר':''}</div>`:''}</div><div style="display:flex;align-items:center;gap:5px"><svg width="52" height="52" style="transform:rotate(-90deg)"><circle cx="26" cy="26" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="4"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="${rc}" stroke-width="4" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${sd.toFixed(1)}" stroke-linecap="round"/><text x="26" y="30" text-anchor="middle" style="fill:${rc};font-size:10px;font-weight:800;transform:rotate(90deg);transform-origin:26px 26px">${pct.toFixed(0)}%</text></svg><div style="display:flex;flex-direction:column;gap:3px"><button class="btn-icon" style="color:var(--blue);font-size:14px" onclick="openEditGoal(${g.id})">✏️</button><button class="btn-icon" style="color:var(--red);font-size:14px" onclick="delGoal(${g.id})">🗑</button></div></div></div><div class="goal-stats"><div class="goal-stat"><label>יעד</label><span style="color:var(--gold)">₪${fmt(g.target)}</span></div><div class="goal-stat"><label>נחסך</label><span style="color:var(--green)">₪${fmt(g.saved||0)}</span></div><div class="goal-stat"><label>נותר</label><span style="color:var(--text2)">₪${fmt(rem)}</span></div>${g.monthly?`<div class="goal-stat"><label>לחודש</label><span style="color:var(--blue)">₪${fmt(g.monthly)}</span></div>`:''}</div>${bT?`<div class="goal-badge ${bC}">${bT}</div>`:''}<div class="prog-bg" style="margin-top:10px"><div class="prog-fill" style="width:${pct}%;background:${rc}"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><span style="color:var(--text2);font-size:12px">${pct.toFixed(0)}% הושג</span>${done?'<span style="color:var(--green);font-weight:800">🎉 הושג!</span>':`<div style="display:flex;gap:5px;flex-wrap:wrap">${[500,1000,2000,5000].map(a=>`<button class="btn-mini" onclick="addGSave(${g.id},${a})">+₪${fmt(a)}</button>`).join('')}</div>`}</div></div>`});d.innerHTML=h;return d}

function gCalcHTML(mon,mos,dl,achiev,avail){return`<div style="background:var(--bg);border:1px solid ${achiev===true?'rgba(124,232,192,0.3)':achiev===false?'rgba(232,124,124,0.3)':'rgba(124,184,232,0.3)'};border-radius:11px;padding:12px;margin-bottom:12px;text-align:center"><div style="color:var(--text2);font-size:12px">כדי להגיע${dl?' עד '+monthLabel(dl):' עוד שנה'} (${mos} חודשים):</div><div style="font-size:24px;font-weight:800;color:${achiev===true?'var(--green)':achiev===false?'var(--red)':'var(--blue)'};margin:5px 0">₪${fmt(mon)} / חודש</div>${achiev===true?'<div style="color:var(--green);font-size:11px">✅ בר-השגה לפי המשכורת שלך</div>':''}${achiev===false?`<div style="color:var(--red);font-size:11px">⚠️ גבוה מהיכולת הפנויה (₪${fmt(avail)})</div>`:''}</div>`}

div></div>`;h+=rAllocSec(alloc,sal,fixT);h+=`<div style="border-top:2px solid var(--border);margin:4px 0 14px"></div><h3 style="font-size:15px;font-weight:800;margin-bottom:10px;color:var(--gold)">💰 קבלת משכורת</h3>`;if(salSt.step===0){h+=`<div class="card"><div style="text-align:center;padding:10px 0 16px"><div style="font-size:44px;margin-bottom:7px">💰</div><h3 style="margin:0 0 5px;color:var(--text)">קיבלת משכורת?</h3><p style="color:var(--text2);font-size:13px;margin-bottom:14px">יום ${s.salaryDay||10} לחודש</p>${s.monthlySalary?`<p style="color:var(--gold);font-size:12px;margin-bottom:10px">משכורת רגילה: ₪${fmt(parseFloat(s.monthlySalary))}</p>`:''}<input class="inp" type="number" id="sal-inp" style="font-size:24px;font-weight:800;text-align:center;max-width:240px;margin:0 auto 14px" placeholder="₪ סכום" value="${salSt.amt}" oninput="salSt.amt=this.value;reRenderSal()"></div>`;if(salSt.amt){h+=`<div style="margin-bottom:14px"><div class="card-title">📤 חלוקת המשכורת</div>`;if(fixed.length&&!salSt.dists.length)h+=`<button class="btn-secondary" style="margin-bottom:10px;font-size:12px" onclick="loadSalF()">📋 טען מהגדרות</button>`;salSt.dists.forEach((dt,i)=>{h+=`<div class="dist-row" style="background:${DC[dt.category]||'#aaa'}15;border:1px solid ${DC[dt.category]||'#aaa'}33;margin-bottom:5px"><div><span style="font-weight:700;color:var(--text)">${dt.name}</span><span style="color:var(--text2);font-size:11px;margin-right:7px">${DCAT.find(c=>c.id===dt.category)?.l||''}</span></div><div style="display:flex;align-items:center;gap:7px"><span style="color:${DC[dt.category]};font-weight:800">-₪${fmt(parseFloat(dt.amount))}</span><button class="btn-icon" style="color:var(--red)" onclick="remSD(${i})">✕</button></div></div>`});h+=`<div class="pills">${DCAT.map(c=>`<button class="btn-pill ${salSt.nCat===c.id?'active':''}" onclick="setSDC('${c.id}')" style="${salSt.nCat===c.id?'border-color:'+DC[c.id]+';color:'+DC[c.id]:''}">${c.l}</button>`).join('')}</div>`;h+=`<div style="display:flex;gap:7px;margin-bottom:10px"><input class="inp" id="sd-name" style="flex:2" placeholder="שם התשלום" value="${salSt.nName}" oninput="salSt.nName=this.value"><input class="inp" id="sd-amt" style="flex:1" type="number" placeholder="₪" value="${salSt.nAmt}" oninput="salSt.nAmt=this.value"><button class="btn-primary" onclick="addSD()">+</button></div>`;if(salSt.dists.length)h+=`<div class="salary-summary"><div class="row"><span style="color:var(--text)">💰 משכורת</span><span style="color:var(--green);font-weight:700">₪${fmt(parseFloat(salSt.amt))}</span></div><div class="row"><span style="color:var(--text)">📤 תשלומים</span><span style="color:var(--red);font-weight:700">-₪${fmt(totD)}</span></div><div class="row" style="border-top:2px solid var(--border2);margin-top:5px;padding-top:10px"><strong style="font-size:15px;color:var(--text)">נשאר לשיקול דעת</strong><strong style="font-size:19px;color:${leftover>=0?'var(--green)':'var(--red)'}">₪${fmt(leftover)}</strong></div>${leftover<0?'<div class="warn-box" style="margin-top:7px">⚠️ ההוצאות עולות על המשכורת!</div>':''}</div>`;h+='</div>';h+=`<button class="btn-primary" style="width:100%;font-size:15px" onclick="submitSal()">✅ אשר ורשום משכורת</button>`}h+='</div>'}else{h+=`<div class="card" style="text-align:center;padding:24px;border-color:rgba(124,232,192,0.3)"><div style="font-size:44px">✅</div><div style="font-weight:800;font-size:19px;color:var(--green);margin-top:7px">₪${fmt(parseFloat(salSt.amt))} נרשמה!</div><button class="btn-secondary" style="margin-top:14px" onclick="resetSal()">הזן משכורת נוספת</button></div>`;if(alloc.length&&leftover>0){h+='<div class="card"><div class="card-title">💡 חלוקת מה שנשאר</div>';alloc.forEach(a=>{const p=a.percent||(leftover>0&&a.shekel?Math.round(a.shekel/leftover*100):0);const shk=a.shekel||Math.round(p*leftover/100);h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="color:var(--text)">${a.name} (${ function salCH(sal,fixT){const net=sal-fixT;const pct=Math.round(fixT/sal*100);return`<div class="info-box" style="margin-top:10px"><div style="display:flex;justify-content:space-between"><span style="color:var(--text2)">משכורת נטו</span><span style="color:var(--green);font-weight:700">₪${fmt(sal)}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--text2)">הוצאות קבועות</span><span style="color:var(--red);font-weight:700">-₪${fmt(fixT)}</span></div><div style="display:flex;justify-content:space-between;border-top:1px solid var(--border2);margin-top:7px;padding-top:7px"><strong style="color:var(--text)">נשאר לשיקול דעת</strong><strong style="color:${net>=0?'var(--green)':'var(--red)'}">₪${fmt(net)}</strong></div><div style="color:var(--text2);font-size:11px;margin-top:4px">${pct}% להוצאות קבועות${pct>50?' — <span style="color:var(--red)">מעל 50%!</span>':''}</div></div>`}
function refSalC(){const sal=parseFloat(DB.settings.monthlySalary)||0;const fixT=(DB.settings.fixedExpenses||[]).reduce((s,e)=>s+e.amount,0);const el=document.getElementById('sal-calc');if(el)el.innerHTML=sal&&fixT?salCH(sal,fixT):''}
function rAllocSec(alloc,sal,fixT){const net=sal-fixT;const totP=alloc.reduce((s,a)=>s+(a.percent||(net>0&&a.shekel?Math.round(a.shekel/net*100):0)),0);let h=`<div class="card"><div class="card-title">📊 חלוקת חיסכון</div><div class="info-box" style="margin-bottom:10px;font-size:11px">לאן ילך מה שנשאר אחרי ההוצאות?</div><div class="alloc-mode-row"><button class="btn-pill active" id="am-pct" onclick="setAM('percent')">% אחוזים</button><button class="btn-pill" id="am-shk" onclick="setAM('shekel')">₪ שקלים</button></div>`;alloc.forEach((a,i)=>{const p=a.percent||(net>0&&a.shekel?Math.round(a.shekel/net*100):0);const shk=a.shekel||(net>0?Math.round(p*net/100):0);h+=`<div class="row"><span style="color:var(--text)">${a.name}</span><div style="display:flex;gap:9px;align-items:center">${net>0?`<span style="color:var(--green);font-size:12px">₪${fmt(shk)}</span>`:''}<span style="color:var(--gold);font-weight:700">${p}%</span><button class="btn-icon" style="color:var(--red)" onclick="remAlloc(${i})">✕</button></div></div>`});h+=`<div style="display:flex;gap:7px;margin-top:10px"><input class="inp" id="al-name" style="flex:2" placeholder="שוק ההון, קרן חירום..."><div style="position:relative;flex:1"><input class="inp" id="al-val" type="number" placeholder="30" style="padding-left:22px"><span id="al-sym" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none">%</span></div><button class="btn-primary" onclick="addAlloc()">+</button></div>`;if(alloc.length)h+=`<div class="row" style="border-top:1px solid var(--border2);margin-top:7px;padding-top:9px"><strong style="color:var(--text)">סה״כ מוקצה</strong><span style="color:${totP>100?'var(--red)':'var(--gold)'};font-weight:800">${totP}% ${totP>100?'⚠️ חריגה':totP===100?'✅':''}</span></div>`;h+='</div>';return h}
function reRenderSal(){if(curTab==='salary'){const c=document.getElementById('content');c.innerHTML='';c.appendChild(rSalary())}}
window._fec='expense';window._rt='fixed';window._am='percent';
function selFEC(c){window._fec=c;document.querySelectorAll('#fe-pills .btn-pill').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('fec-'+c);if(btn){btn.classList.add('active');const ct=fxCat(c);btn.style.borderColor=ct.color;btn.style.color=ct.color}}
function addFE(){const n=(document.getElementById('fe-name')||{}).value||'';const a=parseFloat((document.getElementById('fe-amt')||{}).value||0);if(!n||!a)return;DB.settings.fixedExpenses=DB.settings.fixedExpenses||[];DB.settings.fixedExpenses.push({name:n,amount:a,category:window._fec||'expense'});saveData();goTab('salary')}

function selRT(t){window._rt=t;['fixed','variable'].forEach(x=>{const b=document.getElementById('rt-'+x);if(b)b.classList.toggle('active',x===t)})}

function remRec(i){DB.settings.recurringPayments.splice(i,1);saveData();goTab('salary')}
function setAM(m){window._am=m;const sym=document.getElementById('al-sym');if(sym)sym.textContent=m==='percent'?'%':'₪';['pct','shk'].forEach(x=>{const b=document.getElementById('am-'+x);if(b)b.classList.toggle('active',x===(m==='percent'?'pct':'shk'))})}
function addAlloc(){const n=(document.getElementById('al-name')||{}).value||'';const v=parseFloat((document.getElementById('al-val')||{}).value||0);if(!n||!v)return;const sal=parseFloat(DB.settings.monthlySalary)||0;const fixT=(DB.settings.fixedExpenses||[]).reduce((s,e)=>s+e.amount,0);const net=sal-fixT;DB.settings.savingsAllocation=DB.settings.savingsAllocation||[];if(window._am==='percent')DB.settings.savingsAllocation.push({name:n,percent:v});else DB.settings.savingsAllocation.push({name:n,shekel:v,percent:net>0?Math.round(v/net*100):0});saveData();goTab('salary')}
function remAlloc(i){DB.settings.savingsAllocation.splice(i,1);saveData();goTab('salary')}
function setSDC(c){salSt.nCat=c;reRenderSal()}

function loadSalF(){const f=DB.settings.fixedExpenses||[];const r=(DB.settings.recurringPayments||[]).filter(x=>x.type==='fixed');salSt.dists=[...f.map(e=>({name:e.name,amount:String(e.amount),category:e.category||'expense'})),...r.map(x=>({name:x.name,amount:String(x.amount),category:'expense'}))];reRenderSal()}
function submitSal(){if(!salSt.amt)return;const txs=[{id:uid(),type:'income',category:'משכורת',amount:parseFloat(salSt.amt),date:todayStr(),note:'משכורת חודשית'}];salSt.dists.forEach((dt,i)=>{txs.push({id:uid()+i,type:'expense',category:dt.category==='savings'?'חיסכון / השקעה':dt.category==='mortgage'?'שכר דירה / משכנתא':dt.name,amount:parseFloat(dt.amount),date:todayStr(),note:dt.name})});DB.transactions.push(...txs);saveData();salSt.step=2;reRenderSal()}

function sSF(k,v){DB.settings=DB.settings||{};DB.settings[k]=v;saveData();if(k==='name'){const sub=document.getElementById('logo-sub');if(sub){sub.textContent='שלום, '+v+' 👋';sub.style.display=v?'block':'none'}}}

;d.innerHTML=h;setTimeout(()=>{const el=document.getElementById('chat-messages');if(el)el.scrollTop=el.scrollHeight},50);return d}
function setAIQ(q){const el=document.getElementById('ai-inp');if(el)el.value=q}
function clearAI(){DB.aiChat=[];saveData();goTab('ai')}
async function sendAI(){const inp=document.getElementById('ai-inp');const msg=(inp?.value||'').trim();if(!msg||aiLoading)return;if(inp)inp.value='';DB.aiChat=DB.aiChat||[];DB.aiChat.push({role:'user',content:msg});saveData();aiLoading=true;goTab('ai');const{tot,totFee,uTx,inc,exp,bal}=getFin();const s=DB.settings||{};const invT=DB.investments.length?DB.investments.map(i=>{const c=iCat(i.catId);let l=`• ${c.icon} ${i.displayName}: ₪${fmt(i.currentValue)}`;if(i.annualReturn>0)l+=` | ${i.annualReturn}% תשואה`;if(i.managementFeePercent>0)l+=` | ${i.managementFeePercent}% דמי ניהול`;return l}).join('\n'):'אין נכסים';const eBCat={};uTx.filter(t=>t.type==='expense').forEach(t=>{eBCat[t.category]=(eBCat[t.category]||0)+t.amount});const expT=Object.entries(eBCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`• ${c}: ₪${fmt(v)}`).join('\n')||'אין';const goalsT=DB.goals.map(g=>`• ${g.name}: יעד ₪${fmt(g.target)}, נחסך ₪${fmt(g.saved||0)}`).join('\n')||'אין';const fixedT=(s.fixedExpenses||[]).map(e=>`• ${e.name}: ₪${fmt(e.amount)}`).join('\n')||'לא הוגדרו';const sys=`אתה יועץ פיננסי אישי חכם שמדבר עברית. מתבסס על: היררכיית צרכים פיננסיים, 50/30/20, Zero-Based Budgeting, Debt Avalanche, DCA, פיזור נכסים. לשאלות ספציפיות — ציין שאתה AI ולא יועץ מוסמך.\nפרופיל: ${s.name||'לא ידוע'}, גיל ${s.age||'לא ידוע'}, ${s.familyStatus||''}, ${s.occupation||''}, ${s.city||''}\nמצב: נכסים ₪${fmt(tot)} | הכנסה ₪${fmt(inc)} | הוצאות ₪${fmt(exp)} | יתרה ₪${fmt(bal)} ${bal<0?'⚠️ גירעון':'✅'}\nדמי ניהול חודשיים: ₪${fmt(Math.round(totFee))}\nנכסים:\n${invT}\nהוצאות:\n${expT}\nיעדים:\n${goalsT}\nהוצאות קבועות:\n${fixedT}\nהנחיות: ייעוץ מבוסס נתונים אמיתיים, מספרים ספציפיים, 2-3 אפשרויות, צעדי פעולה. אם יש גירעון — הזכר ראשון.`;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sys,messages:(DB.aiChat||[]).map(m=>({role:m.role,content:m.content}))})});if(!res.ok)throw new Error('HTTP '+res.status);const json=await res.json();const reply=json?.content?.[0]?.text;if(!reply)throw new Error('תשובה ריקה');DB.aiChat.push({role:'assistant',content:reply})}catch(err){DB.aiChat.push({role:'assistant',content:'❌ שגיאה: '+err.message+'\n\nנסה שוב.'})}saveData();aiLoading=false;goTab('ai')}
function rSettings(){const s=DB.settings||{};const d=document.createElement('div');let h=`<h2 class="page-title" style="color:var(--text)">⚙️ הגדרות</h2><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="card-title" style="margin:0">👤 פרופיל אישי</div></div><div class="info-box" style="margin-bottom:12px;font-size:11px">💡 הפרופיל עוזר ליועץ ה-AI לתת ייעוץ מדויק יותר</div>`;h+=`<div class="profile-grid-2" style="margin-bottom:10px"><div class="inp-group" style="margin:0"><label class="inp-label">שם מלא</label><input class="inp" value="${s.name||''}" placeholder="ישראל ישראלי" oninput="sSF('name',this.value)"></div><div class="inp-group" style="margin:0"><label class="inp-label">גיל</label><input class="inp" type="number" value="${s.age||''}" placeholder="30" oninput="sSF('age',this.value)"></div></div>`;h+=`<div class="inp-group"><label class="inp-label">מצב משפחתי</label><div class="pills">${FS.map(f=>`<button class="btn-pill ${s.familyStatus===f?'active':''}" onclick="sSF('familyStatus','${f}');this.closest('.pills').querySelectorAll('.btn-pill').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${f}</button>`).join('')}</div></div>`;h+=`<div class="profile-grid-2" style="margin-bottom:10px"><div class="inp-group" style="margin:0"><label class="inp-label">עיסוק</label><input class="inp" value="${s.occupation||''}" placeholder="מהנדס, עצמאי..." oninput="sSF('occupation',this.value)"></div><div class="inp-group" style="margin:0"><label class="inp-label">עיר מגורים</label><input class="inp" value="${s.city||''}" placeholder="תל אביב" oninput="sSF('city',this.value)"></div></div>`;h+=`<div class="inp-group"><label class="inp-label">הערות / מטרות</label><textarea class="inp" placeholder="לדוגמא: רוצה לפרוש בגיל 55..." oninput="sSF('notes',this.value)">${s.notes||''}</textarea></div></div>`;h+=`<div class="tip-box" style="margin-bottom:10px">💡 פרטי משכורת, הוצאות קבועות, תשלומים חוזרים וחלוקת חיסכון — נמצאים בלשונית <strong>💰 משכורת</strong></div>`;h+=`<div class="card" style="border-color:rgba(232,124,124,0.2)"><div style="color:var(--red);font-weight:700;margin-bottom:5px">🗑 איפוס נתונים</div><p style="color:var(--text2);font-size:12px;margin-bottom:9px">מחיקת כל הנתונים</p><button class="btn-danger" onclick="resetAll()">🗑 מחק הכל</button></div>`;d.innerHTML=h;return d}
function resetAll(){if(confirm('למחוק הכל? פעולה בלתי הפיכה.')){localStorage.removeItem(KEY);location.reload()}}
function showHelp(){let h='<div class="modal-title" style="color:var(--text)">❓ מדריך מהיר</div>';h+=`<div class="tip-box">FinanceFlow — ניהול פיננסי אישי חכם</div>`;[['📊 השקעות','הוסף נכסים, ערוך, מחק. כולל דמי ניהול ותחזית צמיחה.'],['💳 תזרים','הכנסות/הוצאות לפי חודשים עם מאזן.'],['🎯 יעדים','טבעת התקדמות + בדיקת בר-השגה + לוח שנה.'],['💰 משכורת','כולל הגדרות: הוצאות קבועות, תשלומים חוזרים, חלוקת חיסכון.'],['🤖 AI','יועץ פיננסי שמכיר את הנתונים שלך.'],['⚙️ הגדרות','פרופיל אישי בלבד.']].forEach(([t,desc])=>{h+=`<div class="info-box"><strong style="color:var(--text)">${t}</strong> — ${desc}</div>`});h+=`<button class="btn-primary" style="width:100%;margin-top:9px" onclick="closeModal()">הבנתי! 👍</button>`;openModal(h)}
function openModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-overlay').classList.add('show')}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay')){document.getElementById('modal-overlay').classList.remove('show')}}
window.closeModal=closeModal;
render();
</script>
